services:
  - type: web
    name: remote-monitoring-server
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --worker-class gthread --workers 2 --threads 4
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: PYTHON_VERSION
        value: 3.9.0
    ports:
      - port: 5000
      - port: 8765
    healthCheckPath: /
    autoDeploy: true